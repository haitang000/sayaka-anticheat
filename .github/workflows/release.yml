name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and verify
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Verify release artifacts
        shell: bash
        run: |
          shopt -s nullglob
          paper_artifacts=(paper/target/Sayaka-AntiCheat-Paper-*.jar)
          velocity_artifacts=(velocity/target/Sayaka-AntiCheat-Velocity-*.jar)
          if (( ${#paper_artifacts[@]} != 1 || ${#velocity_artifacts[@]} != 1 )); then
            echo "Expected exactly one Paper and one Velocity JAR" >&2
            exit 1
          fi
          paper_artifact=${paper_artifacts[0]}
          legacy_artifact=${paper_artifact/-Paper/}
          cp "$paper_artifact" "$legacy_artifact"
          artifacts=("$paper_artifact" "${velocity_artifacts[0]}" "$legacy_artifact")
          printf '%s\n' "${artifacts[@]}" > release-artifacts.txt

      - name: Upload artifact to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: mapfile -t artifacts < release-artifacts.txt && gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
