name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and verify
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Verify release artifact
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(target/Sayaka-AntiCheat-*.jar)
          if (( ${#artifacts[@]} != 1 )); then
            echo "Expected exactly one release JAR, found ${#artifacts[@]}" >&2
            exit 1
          fi
          echo "RELEASE_ARTIFACT=${artifacts[0]}" >> "$GITHUB_ENV"

      - name: Upload artifact to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "$RELEASE_ARTIFACT" --clobber
