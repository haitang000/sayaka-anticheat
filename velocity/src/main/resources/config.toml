server-id = "velocity"

[database]
jdbc-url = "jdbc:mariadb://127.0.0.1:3306/sayaka"
username = "sayaka"
# Environment placeholders are expanded at startup.
password = "${SAYAKA_DATABASE_PASSWORD}"

[protection]
# Whether servers not listed below enforce shared anti-cheat bans.
default-enabled = true

[protection.servers]
# Override individual Velocity server names. Quote names containing dots.
# lobby = false
# survival = true

[web]
enabled = true
bind = "127.0.0.1"
port = 8080
# Public origin used by /sac web links, for example "https://sac.example.com/".
# Leave empty when the bind address and port are directly reachable by administrators.
public-url = ""
admin-token = "${SAYAKA_ADMIN_TOKEN}"
threads = 4

[web.security]
# Require a CAPTCHA after this many failed manual token logins from one client.
captcha-after-failures = 3
# Lock manual token login until the failure window ends after this many failures.
login-failure-limit = 10
login-window-seconds = 600
# Successful sessions expire after this many seconds without an admin API request.
session-idle-seconds = 43200

[cache]
ban-seconds = 5
