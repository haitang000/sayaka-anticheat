<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sayaka AntiCheat · 申诉与管理面板</title>
  <style>
    html, body, #root { min-height: 100%; margin: 0; }
    body { font-family: -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
    #boot { display: flex; height: 100vh; align-items: center; justify-content: center; color: #666; }
    .app-header { display: flex; align-items: center; gap: 18px; padding: 0 24px; }
    .app-brand { color: #fff; font-size: 18px; font-weight: 650; white-space: nowrap; }
    .page-content { width: 100%; max-width: 1500px; margin: 0 auto; padding: 20px 24px 36px; box-sizing: border-box; }
    .admin-topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 14px; }
    .filter-search { width: min(320px, 100%); }
    .chart { height: 280px; min-width: 0; }
    .captcha-row { display: grid; grid-template-columns: minmax(0, 1fr) 160px 32px; gap: 8px; align-items: center; }
    .captcha-image { display: block; width: 160px; height: 57px; object-fit: cover; border: 1px solid #d9d9d9; border-radius: 6px; }
    .player-link { padding: 0; height: auto; font-weight: 600; }
    .drawer-section { margin-top: 20px; }
    .drawer-section-title { display: block; margin-bottom: 9px; }
    .table-actions { white-space: nowrap; }
    .ant-drawer-content-wrapper { max-width: 100vw !important; }
    @media (max-width: 720px) {
      .app-header { height: auto; min-height: 64px; padding: 10px 12px; flex-wrap: wrap; gap: 8px 12px; }
      .app-brand { width: 100%; font-size: 16px; }
      .page-content { padding: 14px 12px 28px; }
      .admin-topbar { align-items: flex-start; }
      .filter-search { width: 100%; }
      .filter-row > .ant-picker, .filter-row > .ant-select { flex: 1 1 150px; min-width: 0; }
      .chart { height: 240px; }
    }
    @media (max-width: 480px) {
      .captcha-row { grid-template-columns: minmax(0, 1fr) 32px; }
      .captcha-input { grid-column: 1 / -1; }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script crossorigin src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script crossorigin src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/echarts@5/dist/echarts.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="boot">正在加载面板…</div></div>

  <script type="text/babel" data-plugins="transform-react-jsx">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;
    const {
      ConfigProvider, theme, Layout, Typography, Segmented, Card, Input, Button, Form,
      Row, Col, Statistic, Table, Tag, Drawer, Descriptions, Space, Empty, Modal,
      message, Alert, Spin, Tabs, Select, DatePicker, Checkbox, AutoComplete, Timeline,
      Divider, Tooltip, Switch, InputNumber
    } = antd;
    const Icons = window.icons || {};
    const { Header, Content } = Layout;
    const { Title, Text, Paragraph } = Typography;
    const { RangePicker } = DatePicker;

    const SESSION_KEY = 'sayaka-admin-session';
    const LEGACY_TOKEN_KEY = 'sayaka-admin-token';
    const fmt = (ts) => (ts ? dayjs(ts).format('YYYY-MM-DD HH:mm') : '—');
    const icon = (name) => Icons[name] ? React.createElement(Icons[name]) : null;

    function readLoginTicket() {
      const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
      return new URLSearchParams(hash).get('admin-login');
    }

    function clearLoginTicketFromUrl() {
      window.history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    const STATUS_META = {
      PENDING: { color: 'gold', label: '待处理' },
      APPROVED: { color: 'green', label: '已通过' },
      REJECTED: { color: 'red', label: '已驳回' },
    };

    async function api(path, { method = 'GET', body, token } = {}) {
      const headers = {};
      if (body) headers['Content-Type'] = 'application/json';
      if (token) headers['X-Admin-Session'] = token;
      const response = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
      let data = null;
      try { data = await response.json(); } catch (ignored) {}
      if (!response.ok) {
        const error = new Error((data && data.error) || ('请求失败 (' + response.status + ')'));
        error.status = response.status;
        error.code = data && data.code;
        error.captchaRequired = !!(data && data.captchaRequired);
        error.retryAfterSeconds = Number(data && data.retryAfterSeconds) || 0;
        throw error;
      }
      return data;
    }

    function params(values) {
      const query = new URLSearchParams();
      Object.entries(values).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== '' && value !== 'all') query.set(key, value);
      });
      const encoded = query.toString();
      return encoded ? '?' + encoded : '';
    }

    function useDebounced(value, delay = 350) {
      const [debounced, setDebounced] = useState(value);
      useEffect(() => {
        const timer = setTimeout(() => setDebounced(value), delay);
        return () => clearTimeout(timer);
      }, [value, delay]);
      return debounced;
    }

    function StatusTag({ status }) {
      const meta = STATUS_META[status] || { color: 'default', label: status || '—' };
      return <Tag color={meta.color}>{meta.label}</Tag>;
    }

    function BanTag({ active }) {
      return active ? <Tag color="volcano">封禁中</Tag> : <Tag>已到期</Tag>;
    }

    function EvidenceBlock({ punishment }) {
      if (!punishment) return null;
      return <div>
        <Descriptions size="small" column={1} bordered items={[
          { key: 'id', label: '处罚 ID', children: <Text copyable>{punishment.id}</Text> },
          { key: 'p', label: '玩家', children: punishment.playerName },
          { key: 's', label: '来源服', children: punishment.serverId },
          { key: 'c', label: '触发检测', children: punishment.checkDisplay },
          { key: 'vl', label: '违规值 VL', children: punishment.vl },
          { key: 'h', label: '封禁时长', children: punishment.hours + ' 小时（第 ' + punishment.banNumber + ' 次）' },
          { key: 'b', label: '封禁时间', children: fmt(punishment.bannedAt) },
          { key: 'e', label: '解封时间', children: fmt(punishment.expiresAt) },
          { key: 'st', label: '当前状态', children: <BanTag active={punishment.active} /> },
        ]} />
        {!!(punishment.warnings || []).length && <div className="drawer-section">
          <Text strong className="drawer-section-title">警告记录</Text>
          <Table size="small" rowKey={(_, index) => 'w' + index} pagination={false}
            dataSource={punishment.warnings} columns={[
              { title: '时间', dataIndex: 'at', render: fmt, width: 150 },
              { title: '检测', dataIndex: 'check' },
              { title: '阶段', dataIndex: 'stage', width: 70 },
              { title: 'VL', dataIndex: 'vl', width: 70 },
            ]} scroll={{ x: 520 }} />
        </div>}
        {!!(punishment.detections || []).length && <div className="drawer-section">
          <Text strong className="drawer-section-title">检测证据</Text>
          <Table size="small" rowKey={(_, index) => 'd' + index} pagination={false}
            dataSource={punishment.detections} columns={[
              { title: '时间', dataIndex: 'at', render: fmt, width: 150 },
              { title: '检测', dataIndex: 'check', width: 100 },
              { title: 'VL', dataIndex: 'vl', width: 70 },
              { title: '详情', dataIndex: 'detail' },
            ]} scroll={{ x: 600 }} />
        </div>}
      </div>;
    }

    function AppealView() {
      const initialId = new URLSearchParams(location.search).get('punishment') || '';
      const [query, setQuery] = useState(initialId);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [form] = Form.useForm();

      const lookup = useCallback(async () => {
        const value = query.trim();
        if (!value) { message.warning('请输入处罚 ID 或玩家名称'); return; }
        setLoading(true);
        try {
          const data = await api('/api/appeal/lookup?query=' + encodeURIComponent(value));
          setResult(data);
          form.setFieldsValue({ reason: data.appeal ? data.appeal.reason : '', contact: '' });
        } catch (error) { setResult(null); message.error(error.message); }
        finally { setLoading(false); }
      }, [query, form]);

      useEffect(() => { if (initialId) lookup(); }, []);

      const submit = async (values) => {
        try {
          await api('/api/appeal/submit', {
            method: 'POST', body: { id: result.punishment.id, ...values }
          });
          message.success('申诉已提交');
          lookup();
        } catch (error) { message.error(error.message); }
      };

      const appeal = result && result.appeal;
      const canSubmit = result && (!appeal || appeal.status === 'PENDING');
      return <div style={{ maxWidth: 760, margin: '0 auto' }}>
        <Card>
          <Title level={4} style={{ marginTop: 0 }}>封禁申诉</Title>
          <Paragraph type="secondary">输入处罚 ID 或玩家名称，查看最近一次封禁的判定证据和申诉处理状态。</Paragraph>
          <Space.Compact style={{ width: '100%' }}>
            <Input placeholder="处罚 ID 或玩家名称" value={query}
              onChange={(event) => { setQuery(event.target.value); setResult(null); }}
              onPressEnter={lookup} allowClear />
            <Button type="primary" icon={icon('SearchOutlined')} onClick={lookup} loading={loading}>查询</Button>
          </Space.Compact>
        </Card>
        {loading && <div style={{ textAlign: 'center', padding: 48 }}><Spin /></div>}
        {result && <Card style={{ marginTop: 16 }}>
          <EvidenceBlock punishment={result.punishment} />
          {appeal && appeal.status !== 'PENDING' && <Alert style={{ marginTop: 16 }} showIcon
            type={appeal.status === 'APPROVED' ? 'success' : 'error'}
            message={appeal.status === 'APPROVED' ? '申诉已通过' : '申诉已驳回'}
            description={appeal.note || '暂无管理员留言'} />}
          {appeal && appeal.status === 'PENDING' && <Alert style={{ marginTop: 16 }} type="info" showIcon
            message="申诉处理中" description={'提交时间：' + fmt(appeal.submittedAt)} />}
          {canSubmit && <Form form={form} layout="vertical" style={{ marginTop: 16 }} onFinish={submit}>
            <Form.Item name="reason" label="申诉理由"
              rules={[{ required: true, min: 5, message: '请填写至少 5 个字的申诉理由' }]}>
              <Input.TextArea rows={4} maxLength={2000} showCount />
            </Form.Item>
            <Form.Item name="contact" label="联系方式（选填）"><Input maxLength={200} /></Form.Item>
            <Button type="primary" htmlType="submit">{appeal ? '更新申诉' : '提交申诉'}</Button>
          </Form>}
        </Card>}
      </div>;
    }

    function Chart({ option, dark, height }) {
      const element = useRef(null);
      const instance = useRef(null);
      useEffect(() => {
        if (!element.current || !window.echarts) return;
        instance.current = window.echarts.init(element.current, dark ? 'dark' : undefined, { renderer: 'canvas' });
        const observer = new ResizeObserver(() => instance.current && instance.current.resize());
        observer.observe(element.current);
        return () => { observer.disconnect(); instance.current && instance.current.dispose(); instance.current = null; };
      }, [dark]);
      useEffect(() => { instance.current && instance.current.setOption(option, true); }, [option]);
      return <div ref={element} className="chart" style={height ? { height } : undefined} />;
    }

    function usePrefersDark() {
      const [dark, setDark] = useState(() => window.matchMedia?.('(prefers-color-scheme: dark)').matches || false);
      useEffect(() => {
        const media = window.matchMedia?.('(prefers-color-scheme: dark)');
        if (!media) return;
        const listener = (event) => setDark(event.matches);
        media.addEventListener('change', listener);
        return () => media.removeEventListener('change', listener);
      }, []);
      return dark;
    }

    function AdminLogin({ onConnect }) {
      const [token, setToken] = useState('');
      const [captcha, setCaptcha] = useState(null);
      const [captchaAnswer, setCaptchaAnswer] = useState('');
      const [loading, setLoading] = useState(false);
      const [captchaLoading, setCaptchaLoading] = useState(false);
      const loadCaptcha = useCallback(async () => {
        setCaptchaLoading(true);
        try {
          setCaptcha(await api('/api/admin/login/captcha'));
          setCaptchaAnswer('');
        } catch (error) {
          if (error.code === 'RATE_LIMITED') {
            message.error('请求过于频繁，请在 ' + error.retryAfterSeconds + ' 秒后重试');
          } else {
            message.error(error.message);
          }
        } finally { setCaptchaLoading(false); }
      }, []);
      const connect = async () => {
        if (!token.trim()) { message.warning('请输入管理令牌'); return; }
        if (captcha && !captchaAnswer.trim()) { message.warning('请输入验证码'); return; }
        setLoading(true);
        try {
          const data = await api('/api/admin/login', { method: 'POST', body: {
            token: token.trim(),
            captchaId: captcha && captcha.challengeId,
            captchaAnswer: captchaAnswer.trim()
          }});
          onConnect(data.sessionToken);
        } catch (error) {
          if (error.captchaRequired && error.code !== 'RATE_LIMITED') await loadCaptcha();
          if (error.code === 'INVALID_TOKEN') message.error('管理令牌无效');
          else if (error.code === 'RATE_LIMITED') {
            message.error('登录失败次数过多，请在 ' + error.retryAfterSeconds + ' 秒后重试');
          } else message.error(error.message);
        }
        finally { setLoading(false); }
      };
      return <div style={{ maxWidth: 460, margin: '48px auto 0' }}><Card>
        <Title level={4} style={{ marginTop: 0 }}>管理员登录</Title>
        <Paragraph type="secondary">管理令牌位于 Velocity 的 <Text code>config.toml</Text> 中。</Paragraph>
        <Form layout="vertical" onFinish={connect}>
          <Form.Item><Input.Password placeholder="管理令牌" autoComplete="current-password"
            value={token} onChange={(event) => setToken(event.target.value)} /></Form.Item>
          {captcha && <Form.Item><div className="captcha-row">
            <Input className="captcha-input" placeholder="验证码" maxLength={5} autoComplete="off"
              value={captchaAnswer} onChange={(event) => setCaptchaAnswer(event.target.value.toUpperCase())} />
            <img className="captcha-image" src={captcha.imageDataUrl} alt="验证码" />
            <Tooltip title="刷新验证码"><Button aria-label="刷新验证码" icon={icon('ReloadOutlined')}
              loading={captchaLoading} onClick={loadCaptcha} /></Tooltip>
          </div></Form.Item>}
          <Button block type="primary" htmlType="submit" icon={icon('LoginOutlined')} loading={loading}>进入</Button>
        </Form>
      </Card></div>;
    }

    function PardonModal({ token, punishment, open, onClose, onDone }) {
      const [form] = Form.useForm();
      const [saving, setSaving] = useState(false);
      useEffect(() => { if (open) form.resetFields(); }, [open, form]);
      const submit = async (values) => {
        setSaving(true);
        try {
          await api('/api/admin/punishments/pardon', { method: 'POST', token,
            body: { id: punishment.id, note: values.note || '', resetBanCount: !!values.resetBanCount } });
          message.success('玩家已解封'); onClose(); onDone();
        } catch (error) { message.error(error.message); }
        finally { setSaving(false); }
      };
      return <Modal title={'解封 ' + (punishment ? punishment.playerName : '')} open={open}
        onCancel={onClose} onOk={() => form.submit()} confirmLoading={saving} okText="确认解封">
        <Form form={form} layout="vertical" onFinish={submit} initialValues={{ resetBanCount: false }}>
          <Form.Item name="note" label="管理员说明"><Input.TextArea maxLength={2000} rows={3} /></Form.Item>
          <Form.Item name="resetBanCount" valuePropName="checked"><Checkbox>同时重置累计封禁次数</Checkbox></Form.Item>
        </Form>
      </Modal>;
    }

    function ResolveModal({ token, appeal, approved, open, onClose, onDone }) {
      const [form] = Form.useForm();
      const [saving, setSaving] = useState(false);
      useEffect(() => { if (open) form.resetFields(); }, [open, form]);
      const submit = async (values) => {
        setSaving(true);
        try {
          await api('/api/admin/appeals/resolve', { method: 'POST', token,
            body: { id: appeal.punishmentId, approved, note: values.note || '' } });
          message.success(approved ? '申诉已通过并解封' : '申诉已驳回'); onClose(); onDone();
        } catch (error) { message.error(error.message); }
        finally { setSaving(false); }
      };
      return <Modal title={approved ? '通过申诉并解封' : '驳回申诉'} open={open}
        onCancel={onClose} onOk={() => form.submit()} confirmLoading={saving}
        okText={approved ? '通过并解封' : '确认驳回'} okButtonProps={{ danger: !approved }}>
        <Form form={form} layout="vertical" onFinish={submit}>
          <Form.Item name="note" label="玩家可见留言"><Input.TextArea maxLength={2000} rows={3} /></Form.Item>
        </Form>
      </Modal>;
    }

    function ManualBanModal({ token, open, onClose, onDone }) {
      const [form] = Form.useForm();
      const [saving, setSaving] = useState(false);
      const [options, setOptions] = useState([]);
      const [selected, setSelected] = useState(null);
      useEffect(() => { if (open) { form.resetFields(); setOptions([]); setSelected(null); } }, [open, form]);
      const searchPlayers = async (value) => {
        if (!value || !value.trim()) { setOptions([]); return; }
        try {
          const data = await api('/api/admin/players/search' + params({ q: value }), { token });
          setOptions(data.players.map((player) => ({ value: player.playerUuid, label: player.playerName + ' · ' + player.playerUuid })));
        } catch (error) { message.error(error.message); }
      };
      const submit = async (values) => {
        if (!selected) { message.warning('请先搜索并选择玩家'); return; }
        setSaving(true);
        try {
          await api('/api/admin/punishments/manual', { method: 'POST', token,
            body: { uuid: selected, hours: values.hours, reason: values.reason || '' } });
          message.success('已手动封禁该玩家'); onClose(); onDone();
        } catch (error) { message.error(error.message); }
        finally { setSaving(false); }
      };
      return <Modal title="手动封禁玩家" open={open} onCancel={onClose} onOk={() => form.submit()}
        confirmLoading={saving} okText="确认封禁" okButtonProps={{ danger: true }}>
        <Form form={form} layout="vertical" onFinish={submit} initialValues={{ hours: 24 }}>
          <Form.Item label="玩家（仅可选择数据库中已知的玩家）" required>
            <AutoComplete options={options} onSearch={searchPlayers}
              onSelect={(value) => setSelected(value)} placeholder="搜索玩家名称或 UUID" />
          </Form.Item>
          <Form.Item name="hours" label="封禁时长（小时）" rules={[{ required: true, message: '请输入封禁时长' }]}>
            <InputNumber min={1} max={8760} style={{ width: '100%' }} />
          </Form.Item>
          <Form.Item name="reason" label="封禁理由（选填）"><Input.TextArea maxLength={2000} rows={3} /></Form.Item>
        </Form>
      </Modal>;
    }

    function AdjustBanModal({ token, punishment, open, onClose, onDone }) {
      const [form] = Form.useForm();
      const [saving, setSaving] = useState(false);
      const [expiresAt, setExpiresAt] = useState(null);
      useEffect(() => {
        if (open && punishment) { form.resetFields(); setExpiresAt(dayjs(punishment.expiresAt)); }
      }, [open, punishment, form]);
      const quick = (hours) => setExpiresAt(dayjs(punishment.expiresAt).add(hours, 'hour'));
      const submit = async (values) => {
        if (!expiresAt) { message.warning('请选择新的解封时间'); return; }
        setSaving(true);
        try {
          await api('/api/admin/punishments/adjust', { method: 'POST', token,
            body: { id: punishment.id, expiresAt: expiresAt.valueOf(), note: values.note || '' } });
          message.success('封禁时长已调整'); onClose(); onDone();
        } catch (error) { message.error(error.message); }
        finally { setSaving(false); }
      };
      return <Modal title={'调整封禁时长 · ' + (punishment ? punishment.playerName : '')} open={open}
        onCancel={onClose} onOk={() => form.submit()} confirmLoading={saving} okText="确认调整">
        {punishment && <Paragraph type="secondary">当前解封时间：{fmt(punishment.expiresAt)}</Paragraph>}
        <Space wrap style={{ marginBottom: 12 }}>
          <Button size="small" onClick={() => quick(6)}>+6 小时</Button>
          <Button size="small" onClick={() => quick(24)}>+24 小时</Button>
          <Button size="small" onClick={() => quick(72)}>+72 小时</Button>
          <Button size="small" onClick={() => quick(-24)}>-24 小时</Button>
        </Space>
        <Form form={form} layout="vertical" onFinish={submit}>
          <Form.Item label="新的解封时间" required>
            <DatePicker showTime value={expiresAt} onChange={setExpiresAt} style={{ width: '100%' }} />
          </Form.Item>
          <Form.Item name="note" label="管理员说明"><Input.TextArea maxLength={2000} rows={2} /></Form.Item>
        </Form>
      </Modal>;
    }

    function BatchPardonModal({ token, ids, open, onClose, onDone }) {
      const [form] = Form.useForm();
      const [saving, setSaving] = useState(false);
      useEffect(() => { if (open) form.resetFields(); }, [open, form]);
      const submit = async (values) => {
        setSaving(true);
        try {
          const res = await api('/api/admin/punishments/pardon-batch', { method: 'POST', token,
            body: { ids, note: values.note || '', resetBanCount: !!values.resetBanCount } });
          if (res.failed && res.failed.length) {
            message.warning('已解封 ' + res.succeeded + ' 条，' + res.failed.length + ' 条失败（可能已失效）');
          } else {
            message.success('已批量解封 ' + res.succeeded + ' 条处罚');
          }
          onClose(); onDone();
        } catch (error) { message.error(error.message); }
        finally { setSaving(false); }
      };
      return <Modal title={'批量解封（' + ids.length + ' 条处罚）'} open={open} onCancel={onClose}
        onOk={() => form.submit()} confirmLoading={saving} okText="确认解封" okButtonProps={{ danger: true }}>
        <Form form={form} layout="vertical" onFinish={submit} initialValues={{ resetBanCount: false }}>
          <Form.Item name="note" label="管理员说明"><Input.TextArea maxLength={2000} rows={3} /></Form.Item>
          <Form.Item name="resetBanCount" valuePropName="checked"><Checkbox>同时重置这些玩家的累计封禁次数</Checkbox></Form.Item>
        </Form>
      </Modal>;
    }

    function BroadcastModal({ token, open, onClose }) {
      const [form] = Form.useForm();
      const [saving, setSaving] = useState(false);
      useEffect(() => { if (open) form.resetFields(); }, [open, form]);
      const submit = async (values) => {
        setSaving(true);
        try {
          const res = await api('/api/admin/network/broadcast', { method: 'POST', token,
            body: { message: values.message } });
          message.success('广播已发送给 ' + res.delivered + ' 名在线玩家'); onClose();
        } catch (error) { message.error(error.message); }
        finally { setSaving(false); }
      };
      return <Modal title="广播消息" open={open} onCancel={onClose} onOk={() => form.submit()}
        confirmLoading={saving} okText="发送">
        <Form form={form} layout="vertical" onFinish={submit}>
          <Form.Item name="message" label="消息内容（发送给全服在线玩家）"
            rules={[{ required: true, whitespace: true, message: '请输入广播内容' }]}>
            <Input.TextArea rows={3} maxLength={500} showCount />
          </Form.Item>
        </Form>
      </Modal>;
    }

    function PlayerDrawer({ token, playerUuid, open, onClose, onChanged }) {
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(false);
      const [pardon, setPardon] = useState(null);
      const dark = usePrefersDark();
      const load = useCallback(async () => {
        if (!playerUuid) return;
        setLoading(true);
        try { setProfile(await api('/api/admin/players/detail?uuid=' + encodeURIComponent(playerUuid), { token })); }
        catch (error) { message.error(error.message); }
        finally { setLoading(false); }
      }, [playerUuid, token]);
      useEffect(() => { if (open) load(); }, [open, load]);

      const toggleWhitelist = async () => {
        if (!profile) return;
        const remove = profile.whitelisted;
        const execute = async () => {
          try {
            await api('/api/admin/whitelist/' + (remove ? 'remove' : 'add'), {
              method: 'POST', token, body: { uuid: profile.playerUuid }
            });
            message.success(remove ? '已移出白名单' : '已加入白名单'); load(); onChanged();
          } catch (error) { message.error(error.message); }
        };
        if (remove) Modal.confirm({ title: '将该玩家移出反作弊白名单？', okButtonProps: { danger: true }, onOk: execute });
        else execute();
      };

      const resetPlayer = () => {
        if (!profile) return;
        Modal.confirm({
          title: '重置 ' + profile.playerName + ' 的玩家数据？',
          content: '将清空该玩家的违规计数、管理历史、生效封禁与累计封禁次数（处罚记录保留）。此操作不可撤销。',
          okText: '确认重置', okButtonProps: { danger: true },
          onOk: async () => {
            try {
              await api('/api/admin/players/reset', { method: 'POST', token, body: { uuid: profile.playerUuid } });
              message.success('玩家数据已重置'); load(); onChanged();
            } catch (error) { message.error(error.message); }
          }
        });
      };

      const active = profile && profile.punishments.find((item) => item.id === profile.activePunishmentId);
      const topCheck = useMemo(() => {
        if (!profile || !profile.punishments.length) return null;
        const counts = {};
        profile.punishments.forEach((item) => { counts[item.checkDisplay] = (counts[item.checkDisplay] || 0) + 1; });
        return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
      }, [profile]);
      const vlOption = useMemo(() => {
        if (!profile || !profile.punishments.length) return null;
        const points = [...profile.punishments].sort((a, b) => a.bannedAt - b.bannedAt);
        return {
          backgroundColor: 'transparent', tooltip: { trigger: 'axis' },
          grid: { left: 42, right: 16, top: 24, bottom: 32 },
          xAxis: { type: 'category', data: points.map((item) => dayjs(item.bannedAt).format('MM-DD HH:mm')) },
          yAxis: { type: 'value', name: 'VL' },
          series: [{ name: 'VL', type: 'line', smooth: true, symbolSize: 7,
            data: points.map((item) => item.vl), lineStyle: { color: '#d4380d', width: 3 }, itemStyle: { color: '#d4380d' } }]
        };
      }, [profile]);
      return <>
        <Drawer width={640} open={open} onClose={onClose} title="玩家档案">
          <Spin spinning={loading}>
            {profile && <>
              <Descriptions size="small" bordered column={1} items={[
                { key: 'n', label: '玩家', children: profile.playerName },
                { key: 'u', label: 'UUID', children: <Text copyable>{profile.playerUuid}</Text> },
                { key: 'b', label: '累计封禁', children: profile.banCount },
                { key: 'p', label: '处罚记录', children: profile.punishments.length + ' 条' },
                { key: 't', label: '常见检测', children: topCheck || '—' },
                { key: 'w', label: '白名单', children: profile.whitelisted ? <Tag color="green">已加入</Tag> : <Tag>未加入</Tag> },
              ]} />
              <Space style={{ marginTop: 14 }} wrap>
                <Button icon={icon(profile.whitelisted ? 'UserDeleteOutlined' : 'UserAddOutlined')}
                  danger={profile.whitelisted} onClick={toggleWhitelist}>
                  {profile.whitelisted ? '移出白名单' : '加入白名单'}
                </Button>
                {active && <Button danger type="primary" icon={icon('UnlockOutlined')} onClick={() => setPardon(active)}>解封</Button>}
                <Button danger icon={icon('DeleteOutlined')} onClick={resetPlayer}>重置数据</Button>
              </Space>
              {vlOption && <div className="drawer-section">
                <Text strong className="drawer-section-title">VL 变化趋势</Text>
                <Chart option={vlOption} dark={dark} height={200} />
              </div>}
              <div className="drawer-section">
                <Text strong className="drawer-section-title">管理历史</Text>
                {profile.history.length ? <Timeline items={profile.history.map((item) => ({
                  children: <><Text type="secondary">{fmt(item.at)}</Text><br />{item.text}</>
                }))} /> : <Empty image={Empty.PRESENTED_IMAGE_SIMPLE} description="暂无历史" />}
              </div>
              <div className="drawer-section">
                <Text strong className="drawer-section-title">处罚记录</Text>
                <Table size="small" rowKey="id" dataSource={profile.punishments} pagination={false}
                  columns={[
                    { title: '时间', dataIndex: 'bannedAt', render: fmt, width: 150 },
                    { title: '检测', dataIndex: 'checkDisplay' },
                    { title: '状态', dataIndex: 'active', render: (value) => <BanTag active={value} />, width: 90 },
                  ]} scroll={{ x: 480 }} />
              </div>
            </>}
          </Spin>
        </Drawer>
        <PardonModal token={token} punishment={pardon} open={!!pardon} onClose={() => setPardon(null)}
          onDone={() => { load(); onChanged(); }} />
      </>;
    }

      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(false);

        const to = dayjs().add(1, 'day').startOf('day').valueOf();
        const from = dayjs(to).subtract(days, 'day').valueOf();
        setLoading(true);
        try {
          const [overviewData, statsData] = await Promise.all([

            api('/api/admin/stats' + params({ from, to, tzOffsetMinutes: new Date().getTimezoneOffset() }), { token })
          ]);
          setData(overviewData);
          setStats(statsData);
        } catch (error) { if (error.status === 401) onUnauthorized(); else message.error(error.message); }
        finally { setLoading(false); }
      }, [days, token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);

      const lineOption = useMemo(() => ({
        backgroundColor: 'transparent', tooltip: { trigger: 'axis' }, grid: { left: 45, right: 18, top: 24, bottom: 42 },
        xAxis: { type: 'category', data: (data?.trend || []).map((item) => dayjs(item.start).format('MM-DD')) },
        yAxis: { type: 'value', minInterval: 1 },
        series: [{ name: '处罚', type: 'line', smooth: true, symbolSize: 7,
          data: (data?.trend || []).map((item) => item.count), lineStyle: { color: '#d4380d', width: 3 }, itemStyle: { color: '#d4380d' } }]
      }), [data]);
      const barOption = (items, color) => ({
        backgroundColor: 'transparent', tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: 90, right: 20, top: 18, bottom: 28 },
        xAxis: { type: 'value', minInterval: 1 },
        yAxis: { type: 'category', inverse: true, data: items.map((item) => item.name) },
        series: [{ type: 'bar', data: items.map((item) => item.count), itemStyle: { color }, barMaxWidth: 22 }]
      });
      const appealPieOption = useMemo(() => ({
        backgroundColor: 'transparent', tooltip: { trigger: 'item' },
        legend: { bottom: 0 },
        series: [{ type: 'pie', radius: ['42%', '68%'], center: ['50%', '44%'],
          label: { formatter: '{b}: {c}' },
          data: (stats?.appealOutcomes || []).map((item) => ({
            name: (STATUS_META[item.name] || {}).label || item.name, value: item.count,
            itemStyle: { color: { PENDING: '#d48806', APPROVED: '#389e0d', REJECTED: '#cf1322' }[item.name] }
          })) }]
      }), [stats]);
      const durationOption = useMemo(() => ({
        backgroundColor: 'transparent', tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: 45, right: 20, top: 24, bottom: 30 },
        xAxis: { type: 'category', data: (stats?.durations || []).map((item) => item.name) },
        yAxis: { type: 'value', minInterval: 1 },
        series: [{ type: 'bar', data: (stats?.durations || []).map((item) => item.count),
          itemStyle: { color: '#722ed1' }, barMaxWidth: 42 }]
      }), [stats]);
      const heatOption = useMemo(() => {
        const dayLabels = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        const cells = (stats?.heatmap || []).map((cell) => [cell.hour, cell.day, cell.count]);
        const maxCount = Math.max(1, ...cells.map((cell) => cell[2]));
        return {
          backgroundColor: 'transparent',
          tooltip: { position: 'top', formatter: (point) => dayLabels[point.value[1]] + ' ' + point.value[0] + ':00 · ' + point.value[2] + ' 次' },
          grid: { left: 52, right: 16, top: 14, bottom: 64 },
          xAxis: { type: 'category', data: Array.from({ length: 24 }, (ignored, i) => i + '时'), splitArea: { show: true } },
          yAxis: { type: 'category', data: dayLabels, splitArea: { show: true } },
          visualMap: { min: 0, max: maxCount, calculable: true, orient: 'horizontal', left: 'center', bottom: 0,
            inRange: { color: dark ? ['#2b2111', '#ad4e00', '#d4380d'] : ['#fff7e6', '#ffa940', '#d4380d'] } },
          series: [{ type: 'heatmap', data: cells, emphasis: { itemStyle: { shadowBlur: 8, shadowColor: 'rgba(0,0,0,0.4)' } } }]
        };
      }, [stats, dark]);
      return <Spin spinning={loading}>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>运营概览</Title>
          <Space><Segmented value={days} onChange={setDays} options={[{ label: '7 天', value: 7 }, { label: '30 天', value: 30 }, { label: '90 天', value: 90 }]} />
            <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={load} /></Tooltip></Space>
        </div>
        <Row gutter={[12, 12]}>
          <Col xs={12} md={6}><Card><Statistic title="在线玩家" value={data?.onlinePlayers ?? '—'} /></Card></Col>
          <Col xs={12} md={6}><Card><Statistic title="周期处罚" value={data?.periodPunishments || 0} /></Card></Col>
          <Col xs={12} md={6}><Card><Statistic title="当前封禁" value={data?.activeBans || 0} /></Card></Col>
          <Col xs={12} md={6}><Card><Statistic title="待处理申诉" value={data?.pendingAppeals || 0}
            valueStyle={{ color: data?.pendingAppeals ? '#d48806' : undefined }} /></Card></Col>
        </Row>
        <Row gutter={[12, 12]} style={{ marginTop: 12 }}>
          <Col xs={24}><Card title="处罚趋势"><Chart option={lineOption} dark={dark} /></Card></Col>
          <Col xs={24} lg={12}><Card title="检测类型分布"><Chart option={barOption(data?.checks || [], '#d4380d')} dark={dark} /></Card></Col>
          <Col xs={24} lg={12}><Card title="来源服分布"><Chart option={barOption(data?.servers || [], '#1677a3')} dark={dark} /></Card></Col>
          <Col xs={24} lg={12}><Card title="高频违规玩家 TOP 10"><Chart option={barOption(stats?.topPlayers || [], '#722ed1')} dark={dark} /></Card></Col>
          <Col xs={24} lg={12}><Card title="申诉处理结果"><Chart option={appealPieOption} dark={dark} /></Card></Col>
          <Col xs={24} lg={12}><Card title="封禁时长分布"><Chart option={durationOption} dark={dark} /></Card></Col>
          <Col xs={24} lg={12}><Card title="处罚时段热力图"><Chart option={heatOption} dark={dark} /></Card></Col>
        </Row>
      </Spin>;
    }

    function PunishmentsPanel({ token, filters, onUnauthorized }) {
      const [query, setQuery] = useState('');
      const debounced = useDebounced(query);
      const [status, setStatus] = useState('all');
      const [appealStatus, setAppealStatus] = useState('all');
      const [server, setServer] = useState();
      const [check, setCheck] = useState();
      const [range, setRange] = useState(null);
      const [page, setPage] = useState(1);
      const [pageSize, setPageSize] = useState(20);
      const [data, setData] = useState({ items: [], total: 0 });
      const [loading, setLoading] = useState(false);
      const [detail, setDetail] = useState(null);
      const [playerUuid, setPlayerUuid] = useState(null);
      const [pardon, setPardon] = useState(null);
      const [manualBan, setManualBan] = useState(false);
      const [adjust, setAdjust] = useState(null);
      const [selectedRowKeys, setSelectedRowKeys] = useState([]);
      const [batchOpen, setBatchOpen] = useState(false);

      const queryValues = useMemo(() => ({ q: debounced, status, appealStatus, server, check,
        from: range?.[0]?.startOf('day').valueOf(), to: range?.[1]?.add(1, 'day').startOf('day').valueOf(), page, pageSize
      }), [debounced, status, appealStatus, server, check, range, page, pageSize]);
      const load = useCallback(async () => {
        setLoading(true);
        try { setData(await api('/api/admin/punishments' + params(queryValues), { token })); }
        catch (error) { if (error.status === 401) onUnauthorized(); else message.error(error.message); }
        finally { setLoading(false); }
        setSelectedRowKeys([]);
      }, [queryValues, token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);
      useEffect(() => { setPage(1); }, [debounced, status, appealStatus, server, check, range]);

      const reset = () => { setQuery(''); setStatus('all'); setAppealStatus('all'); setServer(); setCheck(); setRange(null); };
      const download = async () => {
        try {
          const exportValues = { ...queryValues }; delete exportValues.page; delete exportValues.pageSize;
          const response = await fetch('/api/admin/punishments/export' + params(exportValues), { headers: { 'X-Admin-Session': token } });
          if (!response.ok) { const body = await response.json(); throw new Error(body.error || '导出失败'); }
          const url = URL.createObjectURL(await response.blob());
          const anchor = document.createElement('a'); anchor.href = url; anchor.download = 'sayaka-punishments.csv'; anchor.click();
          URL.revokeObjectURL(url);
        } catch (error) { message.error(error.message); }
      };
      const columns = [
        { title: '玩家', dataIndex: 'playerName', width: 135, fixed: 'left', render: (value, row) =>
          <Button type="link" className="player-link" onClick={() => setPlayerUuid(row.playerUuid)}>{value}</Button> },
        { title: '来源服', dataIndex: 'serverId', width: 110 },
        { title: '检测', dataIndex: 'checkDisplay', width: 130, ellipsis: true },
        { title: 'VL', dataIndex: 'vl', width: 65 },
        { title: '封禁时间', dataIndex: 'bannedAt', width: 155, render: fmt },
        { title: '状态', dataIndex: 'active', width: 90, render: (value) => <BanTag active={value} /> },
        { title: '申诉', dataIndex: 'appealStatus', width: 95, render: (value) => value ? <StatusTag status={value} /> : <Text type="secondary">无</Text> },
        { title: '操作', key: 'op', width: 145, fixed: 'right', render: (_, row) => <Space size="small" className="table-actions">
          <Button size="small" icon={icon('FileSearchOutlined')} onClick={() => setDetail(row)}>详情</Button>
          {row.active && <Tooltip title="解封"><Button size="small" danger icon={icon('UnlockOutlined')} onClick={() => setPardon(row)} /></Tooltip>}
        </Space> },
      ];
      return <>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>处罚记录</Title>
          <Space>
            {selectedRowKeys.length > 0 && <Button danger icon={icon('UnlockOutlined')}
              onClick={() => setBatchOpen(true)}>批量解封 ({selectedRowKeys.length})</Button>}
            <Button type="primary" icon={icon('PlusOutlined')} onClick={() => setManualBan(true)}>手动封禁</Button>
            <Button icon={icon('DownloadOutlined')} onClick={download}>导出</Button>
            <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={load} loading={loading} /></Tooltip></Space></div>
        <div className="filter-row">
          <Input className="filter-search" prefix={icon('SearchOutlined')} allowClear placeholder="玩家、UUID 或处罚 ID"
            value={query} onChange={(event) => setQuery(event.target.value)} />
          <Select value={status} onChange={setStatus} style={{ width: 120 }} options={[
            { value: 'all', label: '全部状态' }, { value: 'active', label: '封禁中' }, { value: 'expired', label: '已到期' }]} />
          <Select value={appealStatus} onChange={setAppealStatus} style={{ width: 125 }} options={[
            { value: 'all', label: '全部申诉' }, { value: 'PENDING', label: '待处理' }, { value: 'APPROVED', label: '已通过' }, { value: 'REJECTED', label: '已驳回' }]} />
          <Select allowClear placeholder="来源服" value={server} onChange={setServer} style={{ width: 130 }}
            options={(filters.servers || []).map((value) => ({ value, label: value }))} />
          <Select allowClear showSearch placeholder="检测类型" value={check} onChange={setCheck} style={{ width: 150 }}
            options={(filters.checks || []).map((value) => ({ value, label: value }))} />
          <RangePicker value={range} onChange={setRange} allowClear />
          <Button icon={icon('ClearOutlined')} onClick={reset}>重置</Button>
        </div>
        <Table rowKey="id" size="small" loading={loading} dataSource={data.items} columns={columns}
          rowSelection={{ selectedRowKeys, onChange: setSelectedRowKeys,
            getCheckboxProps: (row) => ({ disabled: !row.active }) }}
          scroll={{ x: 1020 }} locale={{ emptyText: <Empty description="暂无处罚记录" /> }}
          pagination={{ current: page, pageSize, total: data.total, showSizeChanger: true, showTotal: (total) => '共 ' + total + ' 条',
            onChange: (next, size) => { setPage(next); setPageSize(size); } }} />
        <Drawer width={640} open={!!detail} onClose={() => setDetail(null)} title="处罚详情"
          extra={detail?.active && <Space>
            <Button icon={icon('FieldTimeOutlined')} onClick={() => setAdjust(detail)}>调整时长</Button>
            <Button danger icon={icon('UnlockOutlined')} onClick={() => setPardon(detail)}>解封</Button>
          </Space>}>
          <EvidenceBlock punishment={detail} />
        </Drawer>
        <PlayerDrawer token={token} playerUuid={playerUuid} open={!!playerUuid} onClose={() => setPlayerUuid(null)} onChanged={load} />
        <PardonModal token={token} punishment={pardon} open={!!pardon} onClose={() => setPardon(null)} onDone={() => { setDetail(null); load(); }} />
        <ManualBanModal token={token} open={manualBan} onClose={() => setManualBan(false)} onDone={load} />
        <AdjustBanModal token={token} punishment={adjust} open={!!adjust} onClose={() => setAdjust(null)}
          onDone={() => { setDetail(null); load(); }} />
        <BatchPardonModal token={token} ids={selectedRowKeys} open={batchOpen} onClose={() => setBatchOpen(false)}
          onDone={() => { setSelectedRowKeys([]); load(); }} />
      </>;
    }

        <Drawer width={640} open={!!detail} onClose={() => setDetail(null)} title="申诉详情">
          {detail && <>
            <Descriptions size="small" bordered column={1} items={[
              { key: 'r', label: '申诉理由', children: detail.reason },
              { key: 'c', label: '联系方式', children: detail.contact || '—' },
              { key: 's', label: '处理状态', children: <StatusTag status={detail.status} /> },
              { key: 'n', label: '管理员留言', children: detail.note || '—' },
            ]} />
            <Divider />
            <EvidenceBlock punishment={detail.punishment} />
          </>}
        </Drawer>
        <ResolveModal token={token} appeal={resolve?.appeal} approved={resolve?.approved} open={!!resolve}
          onClose={() => setResolve(null)} onDone={() => { setDetail(null); load(); }} />
        <PlayerDrawer token={token} playerUuid={playerUuid} open={!!playerUuid} onClose={() => setPlayerUuid(null)} onChanged={load} />
      </>;
    }

    function WhitelistPanel({ token, onUnauthorized }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);
      const [search, setSearch] = useState('');
      const [options, setOptions] = useState([]);
      const [selected, setSelected] = useState(null);
      const [playerUuid, setPlayerUuid] = useState(null);
      const load = useCallback(async () => {
        setLoading(true);
        try { setItems((await api('/api/admin/whitelist', { token })).items || []); }
        catch (error) { if (error.status === 401) onUnauthorized(); else message.error(error.message); }
        finally { setLoading(false); }
      }, [token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);
      const searchPlayers = async (value) => {
        setSearch(value); setSelected(null);
        if (!value.trim()) { setOptions([]); return; }
        try {
          const data = await api('/api/admin/players/search' + params({ q: value }), { token });
          setOptions(data.players.map((player) => ({ value: player.playerUuid, label: player.playerName + ' · ' + player.playerUuid })));
        } catch (error) { message.error(error.message); }
      };
      const add = async () => {
        if (!selected) { message.warning('请先选择玩家'); return; }
        try {
          await api('/api/admin/whitelist/add', { method: 'POST', token, body: { uuid: selected } });
          message.success('已加入白名单'); setSearch(''); setSelected(null); setOptions([]); load();
        } catch (error) { message.error(error.message); }
      };
      const remove = (row) => Modal.confirm({ title: '将 ' + row.playerName + ' 移出反作弊白名单？',
        okButtonProps: { danger: true }, onOk: async () => {
          try { await api('/api/admin/whitelist/remove', { method: 'POST', token, body: { uuid: row.playerUuid } }); message.success('已移出白名单'); load(); }
          catch (error) { message.error(error.message); }
        }});
      return <>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>反作弊白名单</Title>
          <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={load} loading={loading} /></Tooltip></div>
        <div className="filter-row">
          <AutoComplete className="filter-search" value={search} options={options} onSearch={searchPlayers}
            onSelect={(value, option) => { setSelected(value); setSearch(option.label); }} placeholder="搜索已知玩家" />
          <Button type="primary" icon={icon('UserAddOutlined')} onClick={add}>加入</Button>
        </div>
        <Table rowKey="playerUuid" size="small" loading={loading} dataSource={items} pagination={{ pageSize: 20 }}
          columns={[
            { title: '玩家', dataIndex: 'playerName', render: (value, row) => <Button type="link" className="player-link" onClick={() => setPlayerUuid(row.playerUuid)}>{value}</Button> },
            { title: 'UUID', dataIndex: 'playerUuid', responsive: ['md'] },
            { title: '操作', width: 100, render: (_, row) => <Button size="small" danger icon={icon('UserDeleteOutlined')} onClick={() => remove(row)}>移除</Button> },
          ]} locale={{ emptyText: <Empty description="白名单为空" /> }} />
        <PlayerDrawer token={token} playerUuid={playerUuid} open={!!playerUuid} onClose={() => setPlayerUuid(null)} onChanged={load} />
      </>;
    }

    function OnlinePlayersPanel({ token, onUnauthorized }) {
      const [data, setData] = useState({ players: [], total: 0 });
      const [loading, setLoading] = useState(false);
      const [query, setQuery] = useState('');
      const [playerUuid, setPlayerUuid] = useState(null);
      const [broadcastOpen, setBroadcastOpen] = useState(false);
      const load = useCallback(async () => {
        setLoading(true);
        try { setData(await api('/api/admin/network/players', { token })); }
        catch (error) { if (error.status === 401) onUnauthorized(); else message.error(error.message); }
        finally { setLoading(false); }
      }, [token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);
      const kick = (row) => Modal.confirm({ title: '将 ' + row.playerName + ' 踢出服务器？',
        okButtonProps: { danger: true }, onOk: async () => {
          try { await api('/api/admin/network/players/kick', { method: 'POST', token, body: { uuid: row.playerUuid } });
            message.success('已踢出玩家'); load(); }
          catch (error) { message.error(error.message); }
        }});
      const normalized = query.trim().toLowerCase();
      const rows = normalized ? data.players.filter((p) =>
        p.playerName.toLowerCase().includes(normalized) || p.playerUuid.toLowerCase().includes(normalized)
        || (p.server || '').toLowerCase().includes(normalized)) : data.players;
      const columns = [
        { title: '玩家', dataIndex: 'playerName', render: (value, row) => <Button type="link" className="player-link" onClick={() => setPlayerUuid(row.playerUuid)}>{value}</Button> },
        { title: '所在节点', dataIndex: 'server', width: 160 },
        { title: '延迟', dataIndex: 'ping', width: 110, render: (value) => value < 0 ? <Text type="secondary">—</Text> : value + ' ms' },
        { title: '操作', key: 'op', width: 130, render: (_, row) => <Space size="small" className="table-actions">
          <Button size="small" icon={icon('FileSearchOutlined')} onClick={() => setPlayerUuid(row.playerUuid)}>档案</Button>
          <Tooltip title="踢出"><Button size="small" danger icon={icon('LogoutOutlined')} onClick={() => kick(row)} /></Tooltip>
        </Space> },
      ];
      return <>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>在线玩家 <Text type="secondary" style={{ fontSize: 14 }}>· {data.total}</Text></Title>
          <Space>
            <Button icon={icon('SoundOutlined')} onClick={() => setBroadcastOpen(true)}>广播消息</Button>
            <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={load} loading={loading} /></Tooltip></Space></div>
        <div className="filter-row">
          <Input className="filter-search" prefix={icon('SearchOutlined')} allowClear placeholder="玩家、UUID 或节点"
            value={query} onChange={(event) => setQuery(event.target.value)} />
        </div>
        <Table rowKey="playerUuid" size="small" loading={loading} dataSource={rows} columns={columns}
          scroll={{ x: 620 }} locale={{ emptyText: <Empty description="当前没有在线玩家" /> }}
          pagination={{ pageSize: 20, showTotal: (total) => '共 ' + total + ' 人' }} />
        <PlayerDrawer token={token} playerUuid={playerUuid} open={!!playerUuid} onClose={() => setPlayerUuid(null)} onChanged={load} />
        <BroadcastModal token={token} open={broadcastOpen} onClose={() => setBroadcastOpen(false)} />
      </>;
    }

    function ActivityPanel({ token, onUnauthorized }) {
      const [data, setData] = useState({ items: [] });
      const [loading, setLoading] = useState(false);
      const [autoRefresh, setAutoRefresh] = useState(true);
      const [playerUuid, setPlayerUuid] = useState(null);
      const load = useCallback(async (silent) => {
        if (!silent) setLoading(true);
        try { setData(await api('/api/admin/activity?limit=50', { token })); }
        catch (error) { if (error.status === 401) onUnauthorized(); else if (!silent) message.error(error.message); }
        finally { setLoading(false); }
      }, [token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);
      useEffect(() => {
        if (!autoRefresh) return;
        const timer = setInterval(() => load(true), 15000);
        return () => clearInterval(timer);
      }, [autoRefresh, load]);
      const items = (data.items || []).map((item, index) => ({
        key: item.kind + '-' + item.punishmentId + '-' + index,
        color: item.kind === 'punishment' ? 'red' : item.status === 'PENDING' ? 'gold' : item.status === 'APPROVED' ? 'green' : 'gray',
        children: <>
          <Space size="small" wrap>
            {item.kind === 'punishment'
              ? <Tag color="volcano">封禁</Tag>
              : <Tag color="gold">申诉</Tag>}
            {item.playerUuid
              ? <Button type="link" className="player-link" onClick={() => setPlayerUuid(item.playerUuid)}>{item.playerName}</Button>
              : <Text strong>{item.playerName}</Text>}
            <Text type="secondary">{item.summary}</Text>
            {item.kind === 'punishment' && item.status === 'active' && <Tag color="red">生效中</Tag>}
            {item.kind === 'appeal' && <StatusTag status={item.status} />}
          </Space>
          <br />
          <Text type="secondary" style={{ fontSize: 12 }}>{fmt(item.at)}</Text>
        </>
      }));
      return <>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>实时动态</Title>
          <Space>
            <Text type="secondary">自动刷新</Text>
            <Switch checked={autoRefresh} onChange={setAutoRefresh} />
            <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={() => load()} loading={loading} /></Tooltip>
          </Space></div>
        <Alert style={{ marginBottom: 14 }} type="info" showIcon
          message="展示全网络最近的封禁与申诉事件，开启自动刷新后每 15 秒更新一次。" />
        <Card>
          <Spin spinning={loading}>
            {items.length
              ? <Timeline items={items} />
              : <Empty image={Empty.PRESENTED_IMAGE_SIMPLE} description="暂无动态" />}
          </Spin>
        </Card>
        <PlayerDrawer token={token} playerUuid={playerUuid} open={!!playerUuid} onClose={() => setPlayerUuid(null)} onChanged={load} />
      </>;
    }

    function SOURCE_META(source) {
      return { override: { color: 'blue', label: '面板覆盖' }, config: { color: 'geekblue', label: '配置文件' } }[source]
        || { color: 'default', label: '默认' };
    }

    function ServerNodesPanel({ token, onUnauthorized }) {
      const [data, setData] = useState({ defaultEnabled: true, servers: [] });
      const [loading, setLoading] = useState(false);
      const [savingKey, setSavingKey] = useState(null);
      const load = useCallback(async () => {
        setLoading(true);
        try { setData(await api('/api/admin/network/servers', { token })); }
        catch (error) { if (error.status === 401) onUnauthorized(); else message.error(error.message); }
        finally { setLoading(false); }
      }, [token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);
      const setProtection = async (name, body) => {
        setSavingKey(name);
        try { await api('/api/admin/protection/set', { method: 'POST', token, body: { server: name, ...body } });
          message.success('保护设置已更新'); await load(); }
        catch (error) { message.error(error.message); }
        finally { setSavingKey(null); }
      };
      const columns = [
        { title: '节点', dataIndex: 'name', render: (value) => <Text strong>{value}</Text> },
        { title: '在线', dataIndex: 'playerCount', width: 80 },
        { title: '状态', dataIndex: 'reachable', width: 130, render: (value, row) => value
          ? <Tag color="green">可达{row.ping >= 0 ? ' · ' + row.ping + 'ms' : ''}</Tag> : <Tag color="red">不可达</Tag> },
        { title: '反作弊保护', dataIndex: 'protectionEnabled', width: 120, render: (value, row) =>
          <Switch checked={value} loading={savingKey === row.name}
            onChange={(checked) => setProtection(row.name, { enabled: checked })} /> },
        { title: '来源', dataIndex: 'source', width: 110, render: (value) => { const m = SOURCE_META(value); return <Tag color={m.color}>{m.label}</Tag>; } },
        { title: '操作', key: 'op', width: 110, render: (_, row) => row.source === 'override'
          ? <Button size="small" icon={icon('RollbackOutlined')} loading={savingKey === row.name}
              onClick={() => setProtection(row.name, { reset: true })}>重置</Button>
          : <Text type="secondary">—</Text> },
      ];
      return <>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>节点状态与保护</Title>
          <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={load} loading={loading} /></Tooltip></div>
        <Alert style={{ marginBottom: 14 }} type="info" showIcon
          message={<span>未单独设置的节点默认<Text strong>{data.defaultEnabled ? '启用' : '停用'}</Text>反作弊保护。切换开关会立即生效并持久化，重启后依然保留。</span>} />
        <Table rowKey="name" size="small" loading={loading} dataSource={data.servers} columns={columns}
          scroll={{ x: 640 }} locale={{ emptyText: <Empty description="未发现后端节点" /> }} pagination={false} />
      </>;
    }

    function fmtBytes(bytes) {
      if (!bytes && bytes !== 0) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(2) + ' MB';
    }

    function SystemPanel({ token, onUnauthorized }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [checking, setChecking] = useState(false);
      const [downloading, setDownloading] = useState(false);
      const load = useCallback(async () => {
        setLoading(true);
        try { setData(await api('/api/admin/system', { token })); }
        catch (error) { if (error.status === 401) onUnauthorized(); else message.error(error.message); }
        finally { setLoading(false); }
      }, [token, onUnauthorized]);
      useEffect(() => { load(); }, [load]);
      const check = async () => {
        setChecking(true);
        try { const res = await api('/api/admin/system/update/check', { method: 'POST', token });
          setData((prev) => ({ ...(prev || {}), update: res.update }));
          message.success(res.update.available ? '发现新版本' : '当前已是最新版本'); }
        catch (error) { message.error(error.message); }
        finally { setChecking(false); }
      };
      const download = async () => {
        setDownloading(true);
        try { const res = await api('/api/admin/system/update/download', { method: 'POST', token });
          setData((prev) => ({ ...(prev || {}), update: res.update }));
          message.success('新版本已下载并暂存'); }
        catch (error) { message.error(error.message); }
        finally { setDownloading(false); }
      };
      const [applying, setApplying] = useState(false);
      const apply = async () => {
        setApplying(true);
        try { const res = await api('/api/admin/system/update/apply', { method: 'POST', token });
          message.success(res.message || '热重载已调度');
          // 面板随内核重启，稍候再拉取新状态
          setTimeout(() => { setApplying(false); load(); }, 8000);
        } catch (error) { message.error(error.message); setApplying(false); }
      };
      const update = data && data.update;
      const available = update && update.available;
      const staged = update && update.staged;
      const hotReload = update && update.hotReload;
      return <Spin spinning={loading}>
        <div className="admin-topbar"><Title level={4} style={{ margin: 0 }}>系统与更新</Title>
          <Tooltip title="刷新"><Button icon={icon('ReloadOutlined')} onClick={load} /></Tooltip></div>
        <Row gutter={[12, 12]}>
          <Col xs={12} md={6}><Card><Statistic title="当前版本" value={(update && update.currentVersion) || '—'} /></Card></Col>
          <Col xs={12} md={6}><Card><Statistic title="节点 ID" value={(data && data.serverId) || '—'} /></Card></Col>
          <Col xs={12} md={6}><Card><Statistic title="在线玩家" value={data ? data.onlinePlayers : '—'} /></Card></Col>
          <Col xs={12} md={6}><Card><Statistic title="群组数据库" value=" "
            formatter={() => !data ? '—' : (data.databaseOnline ? <Tag color="green">正常</Tag> : <Tag color="red">离线</Tag>)} /></Card></Col>
        </Row>
        <Card style={{ marginTop: 12 }} title={<Space>{icon('CloudDownloadOutlined')}一键更新</Space>}>
          {update && !update.enabled && <Alert type="warning" showIcon message="更新功能未启用" />}
          {update && update.enabled && <>
            <Space wrap style={{ marginBottom: 12 }}>
              <Button type="primary" icon={icon('SyncOutlined')} loading={checking} onClick={check}>检查更新</Button>
              <Text type="secondary">上次检查：{fmt(update.lastCheckedAt)}</Text>
            </Space>
            {update.lastError && <Alert style={{ marginBottom: 12 }} type="error" showIcon message="上次操作失败" description={update.lastError} />}
            {!available && <Alert type="success" showIcon message={'已是最新版本（' + update.currentVersion + '）'} />}
            {available && <Alert type="info" showIcon
              message={<span>发现新版本 <Text strong>{available.version}</Text>（当前 {update.currentVersion}）</span>}
              description={<Space direction="vertical" size={4}>
                <a href={available.pageUrl} target="_blank" rel="noreferrer">查看发布说明 →</a>
                <Button type="primary" icon={icon('CloudDownloadOutlined')} loading={downloading} onClick={download}>下载并暂存</Button>
              </Space>} />}
            {staged && <Alert style={{ marginTop: 12 }} type="success" showIcon
              message={'已下载 ' + staged.version + '（' + fmtBytes(staged.sizeBytes) + '）'}
              description={<div>
                <Paragraph style={{ marginBottom: 6 }}>已保存到：<Text code copyable>{staged.path}</Text></Paragraph>
                {hotReload && <Space direction="vertical" size={6}>
                  <Button type="primary" icon={icon('ThunderboltOutlined')} loading={applying} onClick={apply}>热重载应用（无需重启代理）</Button>
                  <Text type="secondary">应用后面板会中断数秒并自动重启到新版本；封禁拦截在切换瞬间短暂放行。下次代理重启前请仍用暂存文件替换 <Text code>plugins</Text> 中的旧 jar，以免回到旧版本。</Text>
                </Space>}
                {!hotReload && <Text type="secondary">用该文件替换 Velocity <Text code>plugins</Text> 目录中旧的插件 jar，然后重启代理即可生效。</Text>}
              </div>} />}
          </>}
        </Card>
      </Spin>;
    }

    function AdminDashboard({ token, onLogout, dark }) {
      const [tab, setTab] = useState('overview');
      const [filters, setFilters] = useState({ servers: [], checks: [] });
      const unauthorized = useCallback(() => { message.error('管理令牌已失效'); onLogout(); }, [onLogout]);
      useEffect(() => {
        api('/api/admin/filters', { token }).then(setFilters).catch((error) => {
          if (error.status === 401) unauthorized(); else message.error(error.message);
        });
      }, [token, unauthorized]);
      const items = [
        { key: 'overview', label: <Space>{icon('DashboardOutlined')}概览</Space>, children: <OverviewPanel token={token} dark={dark} onUnauthorized={unauthorized} /> },
        { key: 'activity', label: <Space>{icon('ThunderboltOutlined')}动态</Space>, children: <ActivityPanel token={token} onUnauthorized={unauthorized} /> },
        { key: 'punishments', label: <Space>{icon('SafetyCertificateOutlined')}处罚</Space>, children: <PunishmentsPanel token={token} filters={filters} onUnauthorized={unauthorized} /> },
        { key: 'appeals', label: <Space>{icon('AuditOutlined')}申诉</Space>, children: <AppealsPanel token={token} onUnauthorized={unauthorized} /> },
        { key: 'players', label: <Space>{icon('UserOutlined')}在线玩家</Space>, children: <OnlinePlayersPanel token={token} onUnauthorized={unauthorized} /> },
        { key: 'nodes', label: <Space>{icon('CloudServerOutlined')}节点</Space>, children: <ServerNodesPanel token={token} onUnauthorized={unauthorized} /> },
        { key: 'whitelist', label: <Space>{icon('TeamOutlined')}白名单</Space>, children: <WhitelistPanel token={token} onUnauthorized={unauthorized} /> },
        { key: 'system', label: <Space>{icon('SettingOutlined')}系统</Space>, children: <SystemPanel token={token} onUnauthorized={unauthorized} /> },
      ];
      return <>
        <div className="admin-topbar">
          <Text type="secondary">管理后台</Text>
          <Button size="small" icon={icon('LogoutOutlined')} onClick={onLogout}>退出</Button>
        </div>
        <Tabs activeKey={tab} onChange={setTab} items={items} destroyInactiveTabPane />
      </>;
    }

    function AdminView({ dark, loginTicket, clearLoginTicket }) {
      const [token, setToken] = useState(() => {
        localStorage.removeItem(LEGACY_TOKEN_KEY);
        return localStorage.getItem(SESSION_KEY) || '';
      });
      const [exchanging, setExchanging] = useState(!!loginTicket);
      const connect = (value) => { localStorage.setItem(SESSION_KEY, value); setToken(value); };
      const logout = useCallback(() => {
        const current = localStorage.getItem(SESSION_KEY);
        localStorage.removeItem(SESSION_KEY);
        setToken('');
        if (current) api('/api/admin/logout', { method: 'POST', token: current }).catch(() => {});
      }, []);
      useEffect(() => {
        if (!loginTicket) return;
        let active = true;
        setExchanging(true);
        api('/api/admin/login/exchange', { method: 'POST', body: { ticket: loginTicket } })
          .then((data) => { if (active) connect(data.sessionToken); })
          .catch((error) => {
            if (active) message.error(error.status === 401
              ? '一次性登录链接无效、已使用或已过期' : error.message);
          })
          .finally(() => {
            clearLoginTicket(null);
            if (active) setExchanging(false);
          });
        return () => { active = false; };
      }, [loginTicket, clearLoginTicket]);
      if (exchanging) {
        return <div style={{ textAlign: 'center', padding: 64 }}><Spin tip="正在登录管理后台…" /></div>;
      }
      return token ? <AdminDashboard token={token} onLogout={logout} dark={dark} /> : <AdminLogin onConnect={connect} />;
    }

    function App() {
      const [loginTicket, setLoginTicket] = useState(readLoginTicket);
      const [view, setView] = useState(() => readLoginTicket() ? 'admin' : 'appeal');
      const [dark, setDark] = useState(() => window.matchMedia?.('(prefers-color-scheme: dark)').matches || false);
      useEffect(() => {
        if (loginTicket) clearLoginTicketFromUrl();
      }, [loginTicket]);
      useEffect(() => {
        const acceptLoginTicket = () => {
          const ticket = readLoginTicket();
          if (!ticket) return;
          setLoginTicket(ticket);
          setView('admin');
          clearLoginTicketFromUrl();
        };
        window.addEventListener('hashchange', acceptLoginTicket);
        return () => window.removeEventListener('hashchange', acceptLoginTicket);
      }, []);
      useEffect(() => {
        const media = window.matchMedia?.('(prefers-color-scheme: dark)');
        if (!media) return;
        const listener = (event) => setDark(event.matches);
        media.addEventListener('change', listener);
        return () => media.removeEventListener('change', listener);
      }, []);
      return <ConfigProvider theme={{ algorithm: dark ? theme.darkAlgorithm : theme.defaultAlgorithm,
        token: { colorPrimary: '#d4380d', borderRadius: 6 } }}>
        <Layout style={{ minHeight: '100vh' }}>
          <Header className="app-header" style={{ background: dark ? '#181818' : '#b83212' }}>
            <div className="app-brand">Sayaka AntiCheat</div>
            <Segmented value={view} onChange={setView} disabled={!!loginTicket} options={[
              { label: '玩家申诉', value: 'appeal' }, { label: '管理后台', value: 'admin' }
            ]} />
          </Header>
          <Content><main className="page-content">{view === 'appeal' ? <AppealView />
            : <AdminView dark={dark} loginTicket={loginTicket} clearLoginTicket={setLoginTicket} />}</main></Content>
        </Layout>
      </ConfigProvider>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
