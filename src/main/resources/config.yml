  update-current: "&a当前已是最新版本 &f%version%&a。"
  update-busy: "&e已有更新检查或安装任务正在进行。"
  update-download-start: "&7正在检查并下载最新版本..."
  update-ready: "&a版本 &f%latest% &a已校验并暂存；请完整重启服务器以应用更新。"
  update-failed: "&c更新失败：%error%"
  update-check-failed: "&c检查更新失败：%error%"
  reset-done: "&a已清空 &f%player% &a的违规数据。"
  whitelist-added: "&a已将 &f%player% &a加入反作弊白名单。"
  whitelist-removed: "&a已将 &f%player% &a移出反作弊白名单。"
  whitelist-already-added: "&e%player% 已在反作弊白名单中。"
  whitelist-not-found: "&c玩家 &f%player% &c不在反作弊白名单中。"
  whitelist-empty: "&7反作弊白名单为空。"
  invalid-player-name: "&c无效的玩家名 &f%player%&c。"
